name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with remote (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch origin main
          git checkout main
          git pull origin main --rebase || git pull origin main

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Bump version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "Local package.json version: $LOCAL_VERSION"
          NPM_VERSION=$(npm view markdown-tex version 2>/dev/null || echo "")
          if [ -z "$NPM_VERSION" ]; then
            BASE_VERSION=$LOCAL_VERSION
          else
            echo "Latest npm version: $NPM_VERSION"
            COMPARE=$(node -e "
              const local = '$LOCAL_VERSION'.split('.').map(Number);
              const npm = '$NPM_VERSION'.split('.').map(Number);
              for (let i = 0; i < 3; i++) {
                if (local[i] > npm[i]) { console.log('local'); process.exit(0); }
                if (local[i] < npm[i]) { console.log('npm'); process.exit(0); }
              }
              console.log('equal');
            ")
            if [ "$COMPARE" = "npm" ] || [ "$COMPARE" = "equal" ]; then
              npm version $NPM_VERSION --no-git-tag-version --allow-same-version
              BASE_VERSION=$NPM_VERSION
            else
              BASE_VERSION=$LOCAL_VERSION
            fi
          fi
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$BASE_VERSION" ]; then
            npm version $BASE_VERSION --no-git-tag-version --allow-same-version
          fi
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          if npm view markdown-tex@$NEW_VERSION version > /dev/null 2>&1; then
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Set version from release (release event)
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION=${TAG#v}
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Verify version before publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Preparing to publish version: $VERSION"
          if npm view markdown-tex@$VERSION version > /dev/null 2>&1; then
            echo "Error: Version $VERSION already exists on npm"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Verify NPM authentication
        run: npm whoami || { echo "Not authenticated. Set NPM_TOKEN in repo secrets."; exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag and push (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git add package.json package-lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump version to ${{ env.VERSION }}"
          fi
          git fetch origin main
          git pull origin main --rebase || git pull origin main --no-edit
          git tag -a "v${{ env.VERSION }}" -m "Release v${{ env.VERSION }}" 2>/dev/null || true
          git push origin HEAD:main
          git push origin "v${{ env.VERSION }}" 2>/dev/null || true

      - name: Create GitHub Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
